plugins {
    id 'java'
}

group = 'com.nz'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    api "net.java.dev.jna:jna:5.17.0"
    api "net.java.dev.jna:jna-platform:5.17.0"

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}
